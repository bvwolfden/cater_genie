services:
  db:
    image: postgres:16-alpine
    container_name: catergenie-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: catergenie
      POSTGRES_PASSWORD: catergenie
      POSTGRES_DB: catergenie
    ports:
      - "5433:5432"
    volumes:
      - catergenie-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catergenie -d catergenie"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  catergenie-pgdata:
